      </g>
    </g>
    <g id="cofre">
      <rect x="0" y="0" width="80" height="18" rx="2" fill="none" stroke="currentColor" stroke-width="1.2"/>
      <line x1="6" y1="6" x2="74" y2="6" stroke="currentColor" stroke-width="0.6" opacity="0.6"/>
      <line x1="6" y1="9" x2="74" y2="9" stroke="currentColor" stroke-width="0.6" opacity="0.6"/>
      <line x1="6" y1="12" x2="74" y2="12" stroke="currentColor" stroke-width="0.6" opacity="0.6"/>
    </g>
    <g id="motor">
