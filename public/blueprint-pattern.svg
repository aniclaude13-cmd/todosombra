      <line x1="6" y1="3" x2="6" y2="11" stroke="currentColor" stroke-width="0.8"/>
      <line x1="12" y1="3" x2="12" y2="11" stroke="currentColor" stroke-width="0.8"/>
      <line x1="18" y1="3" x2="18" y2="11" stroke="currentColor" stroke-width="0.8"/>
      <line x1="24" y1="3" x2="24" y2="11" stroke="currentColor" stroke-width="0.8"/>
      <line x1="30" y1="3" x2="30" y2="11" stroke="currentColor" stroke-width="0.8"/>
      <rect x="42" y="4" width="6" height="6" fill="none" stroke="currentColor" stroke-width="1"/>
    </g>
    <g id="cota">
      <line x1="0" y1="0" x2="60" y2="0" stroke="currentColor" stroke-width="1"/>
      <polyline points="4,-3 0,0 4,3" fill="none" stroke="currentColor" stroke-width="1" stroke-linejoin="round"/>
      <polyline points="56,-3 60,0 56,3" fill="none" stroke="currentColor" stroke-width="1" stroke-linejoin="round"/>
      <line x1="0" y1="-5" x2="0" y2="5" stroke="currentColor" stroke-width="0.8"/>
      <line x1="60" y1="-5" x2="60" y2="5" stroke="currentColor" stroke-width="0.8"/>
    </g>
    <g id="tornillo">
