<svg xmlns="http://www.w3.org/2000/svg" width="480" height="480" viewBox="0 0 480 480">
  <defs>
    <g id="brazo">
      <line x1="0" y1="0" x2="48" y2="32" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
      <line x1="48" y1="32" x2="96" y2="0" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
      <circle cx="0" cy="0" r="3" fill="none" stroke="currentColor" stroke-width="1"/>
      <circle cx="48" cy="32" r="4" fill="none" stroke="currentColor" stroke-width="1"/>
      <circle cx="96" cy="0" r="3" fill="none" stroke="currentColor" stroke-width="1"/>
    </g>
    <g id="engranaje">
      <circle cx="0" cy="0" r="14" fill="none" stroke="currentColor" stroke-width="1.2"/>
      <circle cx="0" cy="0" r="6" fill="none" stroke="currentColor" stroke-width="1"/>
      <g stroke="currentColor" stroke-width="1.2" stroke-linecap="round">
        <line x1="0" y1="-18" x2="0" y2="-14"/>
        <line x1="0" y1="14" x2="0" y2="18"/>
        <line x1="-18" y1="0" x2="-14" y2="0"/>
        <line x1="14" y1="0" x2="18" y2="0"/>
        <line x1="-12.7" y1="-12.7" x2="-9.9" y2="-9.9"/>
        <line x1="9.9" y1="9.9" x2="12.7" y2="12.7"/>
        <line x1="-12.7" y1="12.7" x2="-9.9" y2="9.9"/>
