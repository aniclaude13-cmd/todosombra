    <use href="#engranaje" transform="translate(220,60)"/>
    <use href="#cofre" transform="translate(310,140)"/>
    <use href="#motor" transform="translate(60,220)"/>
    <use href="#cota" transform="translate(180,200)"/>
    <use href="#tornillo" transform="translate(380,40)"/>
    <use href="#lamas" transform="translate(330,280)"/>
    <use href="#brazo" transform="translate(170,330) rotate(8)"/>
    <use href="#engranaje" transform="translate(420,360)"/>
    <use href="#tornillo" transform="translate(40,400)"/>
    <use href="#cota" transform="translate(260,420)"/>
    <use href="#cofre" transform="translate(30,30)"/>
    <use href="#motor" transform="translate(280,360)"/>
    <use href="#tornillo" transform="translate(200,140)"/>
