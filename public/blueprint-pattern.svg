      <line x1="-5" y1="-5" x2="5" y2="5" stroke="currentColor" stroke-width="1"/>
      <line x1="-5" y1="5" x2="5" y2="-5" stroke="currentColor" stroke-width="1"/>
    </g>
    <g id="lamas">
      <rect x="0" y="0" width="54" height="36" fill="none" stroke="currentColor" stroke-width="1.2"/>
      <line x1="0" y1="9" x2="54" y2="9" stroke="currentColor" stroke-width="0.6"/>
      <line x1="0" y1="18" x2="54" y2="18" stroke="currentColor" stroke-width="0.6"/>
      <line x1="0" y1="27" x2="54" y2="27" stroke="currentColor" stroke-width="0.6"/>
